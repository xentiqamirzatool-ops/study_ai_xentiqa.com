<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="StudyAI">
  <defs>
    <linearGradient id="studyai-g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#studyai-g)"/>
  <!-- antenna -->
  <circle cx="32" cy="13" r="2.6" fill="#fff"/>
  <rect x="31" y="15" width="2" height="5" rx="1" fill="#fff"/>
  <!-- robot head -->
  <rect x="17" y="20" width="30" height="22" rx="9" fill="#fff"/>
  <!-- eyes -->
  <circle cx="26" cy="31" r="3.4" fill="#4338CA"/>
  <circle cx="38" cy="31" r="3.4" fill="#7C3AED"/>
